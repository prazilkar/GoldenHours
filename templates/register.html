<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RescueLink | Register Vehicle</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --danger: #ff0000; --blue: #0044ff; --gold: #ffc107; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* --- ✅ HOSPITAL BILLING SECTION BACKGROUND --- */
        .bg-main {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1516549655169-df83a0774514?q=80&w=2000&auto=format&fit=crop') center/cover no-repeat;
            opacity: 0.75;
            z-index: -2;
            filter: brightness(0.6) contrast(1.2);
        }

        .shuttle-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.85) 100%);
            z-index: -1;
        }

        /* --- ✅ TOP SIREN FLASH BAR (MAINTAINED) --- */
        .top-siren-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 8px;
            display: flex; z-index: 100;
        }
        .seg { flex: 1; height: 100%; }
        .seg-red { background: var(--danger); animation: lightFlash 0.5s infinite; }
        .seg-blue { background: var(--blue); animation: lightFlash 0.5s infinite; animation-delay: 0.25s; }

        @keyframes lightFlash { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; box-shadow: 0 0 20px currentColor; } }

        /* --- ✅ SIDE SIREN GLOWS (MAINTAINED) --- */
        .siren-glow { position: fixed; top: 0; width: 50vw; height: 100vh; filter: blur(150px); z-index: -1; opacity: 0.35; }
        .siren-red-glow { left: 0; background: var(--danger); animation: blinkSiren 0.8s infinite alternate; }
        .siren-blue-glow { right: 0; background: var(--blue); animation: blinkSiren 0.8s infinite alternate-reverse; }

        @keyframes blinkSiren { 0% { opacity: 0.1; } 100% { opacity: 0.6; } }

        /* --- CARD DESIGN --- */
        .card { 
            background: rgba(10, 12, 16, 0.92); 
            padding: 35px; border-radius: 28px; 
            width: 100%; max-width: 480px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
            border-top: 6px solid var(--danger);
            backdrop-filter: blur(25px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
            animation: slideUp 0.7s ease-out;
        }

        h2 { color: #fff; font-size: 28px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 25px; }
        
        .input-group { margin-bottom: 15px; position: relative; width: 100%; }
        .input-group i { position: absolute; left: 15px; top: 16px; color: var(--danger); z-index: 1; font-size: 16px; }
        .input-group input { 
            width: 100%; padding: 14px 15px 14px 45px; 
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: #fff; outline: none; transition: 0.3s;
            display: block; font-size: 15px;
        }
        .input-group input:focus { border-color: var(--danger); background: rgba(255,255,255,0.1); }

        .strength-container { margin: -5px 0 15px; text-align: left; }
        .progress-bg { background: rgba(255,255,255,0.1); height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 5px; }
        .progress-bar { height: 100%; width: 0%; transition: 0.4s; }
        .strength-text { font-size: 11px; font-weight: bold; color: #aaa; display: flex; justify-content: space-between; }

        .file-label { display: block; text-align: left; font-size: 11px; color: var(--gold); font-weight: bold; margin: 15px 0 8px; letter-spacing: 1px; text-transform: uppercase; }
        
        .reg-btn { 
            width: 100%; padding: 18px; background: var(--danger); color: #fff; 
            border: none; border-radius: 12px; font-weight: 900; 
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
            letter-spacing: 1.5px; margin-top: 15px;
        }
        .reg-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(255,0,0,0.4); }

        .footer { margin-top: 25px; font-size: 14px; color: #888; }
        .footer a { color: #fff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="bg-main"></div>
    <div class="shuttle-overlay"></div>

    <div class="top-siren-bar">
        <div class="seg seg-red"></div><div class="seg seg-blue"></div>
        <div class="seg seg-red"></div><div class="seg seg-blue"></div>
    </div>
    <div class="siren-glow siren-red-glow"></div>
    <div class="siren-glow siren-blue-glow"></div>

    <div class="card">
        <h2>Register Vehicle</h2>
        <form action="/register" method="POST" enctype="multipart/form-data">
            <div class="input-group">
                <i class="fas fa-hospital"></i>
                <input type="text" name="ambulance_name" placeholder="Ambulance Service Name" required>
            </div>
            
            <div class="input-group">
                <i class="fas fa-hashtag"></i>
                <input type="text" name="ambulance_no" placeholder="Vehicle No (e.g. TN01AB1234)" style="text-transform: uppercase;" pattern="^TN.*" required>
            </div>

            <div class="input-group">
                <i class="fas fa-phone"></i>
                <input type="tel" name="driver_mobile" placeholder="Driver Mobile Number" required>
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" name="password" placeholder="Set Password" oninput="checkStrength()" required>
            </div>

            <div class="strength-container">
                <div class="progress-bg"><div id="bar" class="progress-bar"></div></div>
                <div class="strength-text"><span id="status">Security Level</span><span id="percent">0%</span></div>
            </div>

            <div class="input-group">
                <i class="fas fa-map-marker-alt"></i>
                <input list="districts" name="district" placeholder="Select District" required>
                <datalist id="districts">
                    <option value="Chennai"><option value="Coimbatore"><option value="Madurai">
                </datalist>
            </div>

            <label class="file-label">VEHICLE IMAGES (FRONT, BACK, SIDE)</label>
            <div class="input-group"><i class="fas fa-camera"></i><input type="file" name="img_front" accept="image/*" required></div>
            <div class="input-group"><i class="fas fa-camera"></i><input type="file" name="img_back" accept="image/*" required></div>
            <div class="input-group"><i class="fas fa-camera"></i><input type="file" name="img_side" accept="image/*" required></div>

            <button type="submit" class="reg-btn">Submit Request</button>
        </form>
        <div class="footer">Back to <a href="/">Login</a></div>
    </div>

    <script>
        function checkStrength() {
            let pass = document.getElementById('password').value;
            let bar = document.getElementById('bar');
            let status = document.getElementById('status');
            let percentText = document.getElementById('percent');
            let strength = 0;

            if (pass.length >= 8) strength += 25;
            if (pass.match(/[A-Z]/)) strength += 25;
            if (pass.match(/[0-9]/)) strength += 25;
            if (pass.match(/[!@#$%^&*()]/)) strength += 25;

            bar.style.width = strength + "%";
            percentText.innerText = strength + "%";

            if (strength <= 25) { bar.style.backgroundColor = "#ff4d4d"; status.innerText = "Weak"; }
            else if (strength <= 75) { bar.style.backgroundColor = "#ff9800"; status.innerText = "Medium"; }
            else { bar.style.backgroundColor = "#4caf50"; status.innerText = "Strong"; }
        }
    </script>
</body>
</html>
